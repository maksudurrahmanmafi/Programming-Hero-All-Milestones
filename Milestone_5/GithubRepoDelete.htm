<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Delete</title>
</head>
<body>
    <input type="text" id="repo-delete" placeholder="write repo-delete">
    <button id="delete-button" disabled>Delete</button>

    <script>
        document.getElementById('repo-delete').addEventListener('keyup', (event) => {
            const txt = document.getElementById('delete-button');
            const value = event.target.value;

            if(value === 'repo-delete'){
                txt.removeAttribute('disabled')
            }
            else{
                txt.setAttribute('disabled',true)
            }


        })
    </script>
</body>
</html>
