<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Info</title>
    <style>
       .basic label{
        display: block;
       }
    </style>
</head>
<body>
    <header><h1>Enter your information </h1></header>

    <main>
       <form action="">
         <section>
            <fieldset class="basic">
                <legend>Your Name and Email</legend>
                <label for="name">Name</label>
                <input type="text" placeholder="Enter your name " name="" id="name" required>
                <label for="email">Email</label>
                <input type="email" placeholder="Enter your email " name="" id="email" required>
            </fieldset>
        </section>

        <section>
            <fieldset>
                <legend>Your Blood Group</legend>
                <input type="radio" name="blood group" id="o+">
                <label for="o+">O+</label>
                <input type="radio" name="blood group" id="o-">
                <label for="o-">O-</label>
                <input type="radio" name="blood group" id="a+">
                <label for="a+">A+</label>
                <input type="radio" name="blood group" id="a-">
                <label for="a-">A-</label>
            </fieldset>
        </section>
        <section>
            <input type="search" name="" id="">
            <button>search</button>
            <select name="" id="">
                <option value="1">option_1</option>
                <option value="2">option_2</option>
                <option value="3">option_3</option>
            </select>
            <input type="file" value="Choose file">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

            <input type="date" value="Date">
            <input type="time" value="time">
        </section>
       </form>
    </main>
    <footer></footer>
</body>
</html>
