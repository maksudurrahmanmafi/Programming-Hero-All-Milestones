<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design</title>
    <style>
    /* This is use in every content */
     /* *{
            padding: 20px;
        } */ 
    #Head {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.2;
            margin: 0 0 5px 0; 
        }

       
        h5 {
            margin: 0 0 20px 0;
            color: #7f8c8d;
            font-size: 0.9rem;
            text-transform: uppercase; 
            letter-spacing: 1px;       
        }

       
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid #f1f2f6; 
            padding-top: 15px;
        }

        li {
            font-size: 0.95rem;
            color: #57606f;
            margin-bottom: 10px; 
        }

        li:last-child {
            margin-bottom: 0;
        }

        body{
            background-color: rgb(30, 33, 35);
            justify-content: center;
            align-items: center;
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            
        }
        .items{
            background-color: white;
            width: 400px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 24px rgba(0,0,0,.15);
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="items">
        <header id="Head">Creative <br>Industry </header>
        <h5><small>Design</small></h5>

        <ul >
            <li>phone num : 123444</li>
            <li>email: w@gmail.com</li>
            <li>address : Dhaka</li>
        </ul>
    </div>
</body>
</html>
