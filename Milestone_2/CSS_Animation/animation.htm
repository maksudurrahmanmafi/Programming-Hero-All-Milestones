<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        @keyframes Ball {
            from{
                left: 0;
            }
            to{
                left: calc(100% - 150px);
                background-color: bisque;
            }
            
        }
        @keyframes Ball-Bouns{
            0%{

            }
            25%{

            }
            50%{
                
            }
            100%{

            }
        }
        .container{
            width: 100%;
            height: 400px;
            border: 2px solid black;
            border-radius: 12px;
            background-color: aqua;
            
        }

        .ball{
        position: relative;
        height: 150px;
        width: 150px;
        border-radius: 50%;
        border: 2px solid white;
        background-color: blue;
        animation: Ball 2s ease-in-out 1s infinite alternate;
        }
    </style>
</head>
<body>
        <section>
            <div class="container">
                <div class="ball"></div>
            </div>
        </section>
</body>
</html>
