<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        .Container{
           display: flex;
            align-items: center;
            justify-content: center;


        }
        .container{
            width: 300px;
            height: 300px;
            border: 2px solid rebeccapurple;
            margin: 20px;

        }
        .inner{
           text-align: center;
           
            width: 200px;
            height: 200px;
            border: 2px solid rgb(221, 187, 255);

            background-color: antiquewhite;

        }
        .inner:hover{
            transform: rotate(160deg) skew(25deg) scale(.25,.25) translate(25px,25px);

        }
    </style>
</head>
<body>
    <section class="Container">
        <div class="container">
            <div class="inner">Inner 1</div>
        </div>
        <div class="container">
            <div class="inner">Inner 2</div>
        </div>
        <div class="container">
            <div class="inner">Inner 3</div>
        </div>
    </section>
</body>
</html>
