<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS VARIABLE</title>
    <style>
        :root{
            --primary-color:black;
            --heading: yellow;
            --secondary: Gray;
        }
        body{
            margin: 0 30px;
        }
        h1{
            color: var(--primary-color);
            background-color: var(--heading);
        }

    </style>
</head>
<body>
    <h1>Hello</h1>
    <h2>World</h2>
    <h3>This</h3>
    <h4>is</h4>
    <h5>Python</h5>
    <h6>Programming</h6>
</body>
</html>
