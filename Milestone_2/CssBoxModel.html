<!DOCTYPE html>
<html lang="en">
<head>
    <title>Box Model</title>

    <style>
        body{
            display: flex;
            background-color: antiquewhite;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }

        .boxModel{
            background-color: aliceblue;

            width: 300px;             
            padding: 20px;             
            border-right: 1px solid black;  
            border-radius: 10px;
            text-align: center;
            
            color:purple;
            margin: 30px;  
            text-shadow: 2px 2px saddlebrown;           
        }
    </style>
</head>
<body>

    <h1 class="boxModel">This is CSS Box Model</h1>

    <p class="boxModel">
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </p>

</body>
</html>
