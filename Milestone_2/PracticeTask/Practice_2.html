<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <style>
        .global-button{
            background-color: aquamarine;
            width: 100px;
            height: 50px;
            border-radius: 5px;
        }
        img{
            width: 40%;
            height: 40%;
            object-fit:fill;
        }
        .container-1,.container-2{
            display: flex;
            gap: 20px;
           
            align-items: center;
        }
    </style>
</head>
<body>
    <main>
        <div class="container-1">
            <img src="Mafi_2.jpg" alt="">
            <div>
                <h1>First Image</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium, vel.</p>
            <button class="global-button">Click here</button>
            </div>
        </div>
        <div class="container-2">
            <img src="Mafi_2.jpg" alt="">
           <div> <h1>Second Image</h1>
            <p>Lorem ipsum dolor sit amet.</p>
            <button class="global-button">Click here</button></div>
        </div>
    </main>
</body>
</html>
