<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive</title>
    <style>
.container{
    display: flex;
    gap: 20px;
}

.left{
    flex: 3;
}

.right{
    flex: 7;
}

img{
    width: 100%;
    height: 100vh;
    object-fit: cover;
    display: block;
    border-radius: 10px;
}

@media screen and (max-width:576px){
    .container{
        flex-direction: column;
    }
}
    </style>
  </head>
  <body>
  <div class="container">
    <div class="left">
        <img src="Mafi_2.jpg" alt="Mafi">
    </div>

    <div class="right">
        <img src="Mafi_2.jpg" alt="Mafi">
    </div>
</div>
  </body>
</html>
