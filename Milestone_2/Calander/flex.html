<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container-box{
            display: flex;
            gap: 20px;
            justify-content: center;
            border: 1px solid tomato;
            height: 100vh;
            align-items: center;
             flex-direction:row-reverse;
            
           
        }
        .box{
            display: flex;
            border: 2px solid rgb(17, 144, 255);
            width: 300px;
            height: 200px;
           
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <div class="container-box">
                <div class="box">1</div>
                <div class="box">2</div>
                <div class="box">3</div>
            </div>
        </section>
    </main>
</body>
</html>
