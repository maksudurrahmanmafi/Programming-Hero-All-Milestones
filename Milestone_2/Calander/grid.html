<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <section class="gallery">
        <div class="container">

            
            <div class="grid">
                <img class="span-2" src="bird.png" alt="Bird">
                <img src="bird.png" alt="Bird">
            </div>

           
            <div class="grid">
                <img src="bird.png" alt="Bird">
                <img src="bird.png" alt="Bird">
                <img src="bird.png" alt="Bird">
            </div>

           
            <div class="grid">
                <img src="bird.png" alt="Bird">
                <img class="span-2" src="bird.png" alt="Bird">
            </div>

        </div>
    </section>

</body>
</html>
